<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>QR code</title>

  
  <style>
    body{
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: rgb(200, 211, 211);
      height: 100vh;
    }
    .outline{
      border-radius: 10px;
      background-color: white;
      max-width: 200px;
      padding: 10px;
      text-align: center;
      margin: 20px;
      font-family:sans-serif;
    }
    img{
      border-radius: 10px;
    }
    .para{
      font-size: 15px;
      font-weight: bold;
      margin: 10px 5px;
    }
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="outline">
    <img src="./images/image-qr-code.png" alt="qr-code" width="100%" />
  <p class="para">Improve your front-end skills by building projects</p>

  <p style="font-size: 11px; opacity: 0.7; margin:10px;">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Mumtaj Begam</a>.
  </div>
</body>
</html>
